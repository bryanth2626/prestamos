<div class="page-header">
  <div>
    <h1 class="page-title">Dashboard</h1>
    <p class="page-subtitle">Resumen general del sistema de préstamos</p>
  </div>
</div>

<div class="stats-grid" style="grid-template-columns:repeat(4,1fr)">
  <div class="stat-card">
    <div class="stat-icon" style="--c:#6366f1"><i class="bi bi-tools"></i></div>
    <div class="stat-value" id="stat-herramientas">—</div>
    <div class="stat-label">Herramientas</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#10b981"><i class="bi bi-check-circle-fill"></i></div>
    <div class="stat-value" id="stat-disponibles">—</div>
    <div class="stat-label">Disponibles</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#f59e0b"><i class="bi bi-arrow-right-circle-fill"></i></div>
    <div class="stat-value" id="stat-prestadas">—</div>
    <div class="stat-label">Prestadas</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#ec4899"><i class="bi bi-people-fill"></i></div>
    <div class="stat-value" id="stat-clientes">—</div>
    <div class="stat-label">Clientes</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#6366f1"><i class="bi bi-clock-fill"></i></div>
    <div class="stat-value" id="stat-prestamos-activos">—</div>
    <div class="stat-label">Préstamos activos</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#ef4444"><i class="bi bi-exclamation-triangle-fill"></i></div>
    <div class="stat-value" id="stat-vencidos">—</div>
    <div class="stat-label">Vencidos</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#10b981"><i class="bi bi-box-arrow-in-left"></i></div>
    <div class="stat-value" id="stat-devoluciones">—</div>
    <div class="stat-label">Devoluciones</div>
  </div>
  <div class="stat-card">
    <div class="stat-icon" style="--c:#f59e0b"><i class="bi bi-currency-dollar"></i></div>
    <div class="stat-value" id="stat-valor-inventario" style="font-size:18px">—</div>
    <div class="stat-label">Valor inventario</div>
  </div>
</div>

<div class="row g-4 mt-1">
  <div class="col-lg-7">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title"><i class="bi bi-clock-history me-2"></i>Últimos Préstamos</span>
        <a class="btn-link" onclick="Router.navigateTo('prestamo')" style="cursor:pointer">Ver todos</a>
      </div>
      <div id="tabla-recientes-dashboard"></div>
    </div>
  </div>
  <div class="col-lg-5">
    <div class="card-panel">
      <div class="panel-header">
        <span class="panel-title"><i class="bi bi-bar-chart-fill me-2"></i>Estado del inventario</span>
      </div>
      <div id="chart-estados" class="py-2"></div>
    </div>
  </div>
</div>
