<div class="page-header">
  <div>
    <h1 class="page-title">Marcas</h1>
    <p class="page-subtitle">Gestiona las marcas del catálogo</p>
  </div>
  <button class="btn-primary-action" id="btnNuevaMarca">
    <i class="bi bi-plus-lg"></i> Nueva Marca
  </button>
</div>

<div class="search-bar-row">
  <div class="search-input-wrap">
    <i class="bi bi-search search-icon"></i>
    <input type="text" id="searchMarca" class="search-input" placeholder="Buscar marca…" />
  </div>
  <button class="btn-icon-outline" id="btnRefreshMarcas" title="Recargar">
    <i class="bi bi-arrow-clockwise"></i>
  </button>
</div>

<div class="card-panel">
  <div class="table-responsive">
    <table class="table-custom">
      <thead>
        <tr>
          <th>#</th>
          <th>Nombre de la Marca</th>
          <th>Productos</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="bodyMarcas">
        <tr><td colspan="4" class="text-center py-5"><div class="spinner-custom"></div></td></tr>
      </tbody>
    </table>
  </div>
  <div class="table-footer">
    <span class="text-muted text-sm" id="totalMarcasLabel">Cargando…</span>
  </div>
</div>

<!-- ══ MODAL MARCA (local a esta vista) ══ -->
<div class="modal-overlay" id="modalMarcaOverlay">
  <div class="modal-panel modal-sm">
    <div class="modal-header-custom">
      <div>
        <div class="modal-title-custom" id="modalMarcaTitle">Nueva Marca</div>
        <div class="modal-subtitle">Ingresa el nombre de la marca</div>
      </div>
      <button class="btn-modal-close" id="btnCloseModalMarca"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body-custom">
      <form id="formMarca" novalidate>
        <input type="hidden" id="marcaId" />
        <label class="form-label-custom">Nombre de la Marca <span class="required">*</span></label>
        <input type="text" id="mNombre" class="input-custom" placeholder="Ej: Samsung" maxlength="100" required />
        <div class="field-error" id="err-mNombre"></div>
      </form>
    </div>
    <div class="modal-footer-custom">
      <button class="btn-cancel" id="btnCancelMarca">Cancelar</button>
      <button class="btn-save"   id="btnSaveMarca">
        <span id="btnSaveMarcaText"><i class="bi bi-check-lg me-1"></i> Guardar</span>
        <span id="btnSaveMarcaSpinner" class="d-none"><div class="spinner-sm"></div></span>
      </button>
    </div>
  </div>
</div>
